# Gigante Intelligence Dashboard — Auto-Sync Data Pipeline
# Pulls from Toast, SevenRooms, and Tripleseat APIs
# Runs every 15 min during operating hours (3PM-2AM ET), hourly otherwise
# Can also be triggered manually from GitHub Actions tab

name: Sync Dashboard Data

on:
  schedule:
    # Every 15 min during operating hours (3PM-2AM ET = 20:00-07:00 UTC)
    - cron: '*/15 20-23 * * *'   # 3PM-7PM ET (every 15 min)
    - cron: '*/15 0-6 * * *'     # 7PM-2AM ET (every 15 min)
    # Hourly during off-hours (2AM-3PM ET = 07:00-20:00 UTC)
    - cron: '0 7-19 * * *'       # 2AM-3PM ET (hourly)

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        default: 'false'
        type: boolean
      days_back:
        description: 'Days of history to pull (default: 30, max: 365)'
        required: false
        default: '30'
        type: string
      compare_from:
        description: 'Custom compare: Period A start (YYYY-MM-DD)'
        required: false
        default: ''
        type: string
      compare_to:
        description: 'Custom compare: Period A end (YYYY-MM-DD)'
        required: false
        default: ''
        type: string
      compare_from_prev:
        description: 'Custom compare: Period B start (YYYY-MM-DD)'
        required: false
        default: ''
        type: string
      compare_to_prev:
        description: 'Custom compare: Period B end (YYYY-MM-DD)'
        required: false
        default: ''
        type: string

# Only allow one sync at a time
concurrency:
  group: "data-sync"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run data sync pipeline
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
          SEVENROOMS_CLIENT_ID: ${{ secrets.SEVENROOMS_CLIENT_ID }}
          SEVENROOMS_CLIENT_SECRET: ${{ secrets.SEVENROOMS_CLIENT_SECRET }}
          SEVENROOMS_GIGANTE_VENUE_ID: ${{ secrets.SEVENROOMS_GIGANTE_VENUE_ID }}
          SEVENROOMS_VENUE_GROUP_ID: ${{ secrets.SEVENROOMS_VENUE_GROUP_ID }}
          TRIPLESEAT_CLIENT_ID: ${{ secrets.TRIPLESEAT_CLIENT_ID }}
          TRIPLESEAT_CLIENT_SECRET: ${{ secrets.TRIPLESEAT_CLIENT_SECRET }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '30' }}
          COMPARE_FROM: ${{ github.event.inputs.compare_from || '' }}
          COMPARE_TO: ${{ github.event.inputs.compare_to || '' }}
          COMPARE_FROM_PREV: ${{ github.event.inputs.compare_from_prev || '' }}
          COMPARE_TO_PREV: ${{ github.event.inputs.compare_to_prev || '' }}
        run: |
          COMPARE_ARGS=""
          if [ -n "$COMPARE_FROM" ] && [ -n "$COMPARE_TO" ]; then
            COMPARE_ARGS="--compare-from $COMPARE_FROM --compare-to $COMPARE_TO"
            if [ -n "$COMPARE_FROM_PREV" ] && [ -n "$COMPARE_TO_PREV" ]; then
              COMPARE_ARGS="$COMPARE_ARGS --compare-from-prev $COMPARE_FROM_PREV --compare-to-prev $COMPARE_TO_PREV"
            fi
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python sync_dashboard_data.py --dry-run --days-back $DAYS_BACK $COMPARE_ARGS
          else
            python sync_dashboard_data.py --output dashboard_data.json --days-back $DAYS_BACK $COMPARE_ARGS
          fi

      - name: Rebuild dashboard with fresh data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python rebuild_dashboard.py

      - name: Transform to GIQ Brain format
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python transform_to_giq_brain.py

      - name: Commit and push updated dashboard
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Gigante Bot"
          git config user.email "bot@gigantehospitality.com"

          # Check if there are actual changes
          if git diff --quiet index.html dashboard_data.json data/ 2>/dev/null; then
            echo "No data changes detected, skipping commit"
          else
            git add index.html dashboard_data.json data/
            git commit -m "Auto-sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Dashboard updated and pushed!"
          fi
